name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5   

      - name: Setup SSH access
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY_BASE64 }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            echo "🚀 Connected to EC2"

            cd ~/RapidPost

            echo "📥 Fetching and resetting to latest code"
            git fetch --all
            git reset --hard origin/main

            echo "📦 Installing dependencies"
            cd server
            npm install

            echo "♻️ Reloading PM2 (Zero-Downtime)"
            pm2 reload rapidpost-backend || pm2 start server.js --name rapidpost-backend

            echo "✅ Deployment complete"
          EOF